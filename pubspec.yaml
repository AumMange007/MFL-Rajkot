name: coaching_app
description: MFL ELmana - Professional Language Coaching Platform
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  file_picker: ^8.0.0
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  uuid: ^4.3.3
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  path: ^1.9.1
  dio: ^5.9.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/images/mfl_logo.png"
    background_color: "#000000"
    theme_color: "#000000"
  image_path: "assets/images/mfl_logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/mfl_logo.png"
  min_sdk_android: 21
